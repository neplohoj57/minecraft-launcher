<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Авторизация - Minecraft Launcher</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            background: rgba(0, 0, 0, 0.85);
            padding: 40px;
            border-radius: 20px;
            width: 400px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 32px;
            text-shadow: 0 0 20px rgba(102, 126, 234, 0.8);
        }

        .tabs {
            display: flex;
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.6);
            transition: all 0.3s;
            font-weight: bold;
            border: none;
            background: transparent;
            font-size: 14px;
        }

        .tab.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .tab:hover {
            color: white;
        }

        .form-container {
            display: none;
        }

        .form-container.active {
            display: block;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 8px;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid rgba(102, 126, 234, 0.5);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 14px;
            transition: all 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 15px rgba(102, 126, 234, 0.5);
            background: rgba(255, 255, 255, 0.15);
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .password-toggle {
            position: relative;
        }

        .password-toggle input {
            padding-right: 45px;
        }

        .password-toggle button {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            font-size: 18px;
            padding: 5px 10px;
        }

        .password-toggle button:hover {
            color: white;
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.5);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .error {
            background: rgba(244, 67, 54, 0.2);
            color: #ff5252;
            border: 2px solid #ff5252;
        }

        .success {
            background: rgba(76, 175, 80, 0.2);
            color: #4CAF50;
            border: 2px solid #4CAF50;
        }

        .loader {
            display: none;
            text-align: center;
            margin-top: 15px;
        }

        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 3px solid white;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Minecraft Launcher</h1>

        <div class="tabs">
            <button class="tab active" data-tab="login">Вход</button>
            <button class="tab" data-tab="register">Регистрация</button>
        </div>

        <div class="message error" id="errorMsg"></div>
        <div class="message success" id="successMsg"></div>

        <!-- Форма входа -->
        <div class="form-container active" id="login-form">
            <div class="input-group">
                <label>Никнейм</label>
                <input type="text" id="login-nickname" placeholder="Введите никнейм" autocomplete="username">
            </div>

            <div class="input-group password-toggle">
                <label>Пароль</label>
                <input type="password" id="login-password" placeholder="Введите пароль" autocomplete="current-password">
                <button type="button" onclick="togglePassword('login-password')">👁️</button>
            </div>

            <button class="btn" id="loginBtn" onclick="handleLogin()">Войти</button>
            
            <div class="loader" id="loginLoader">
                <div class="spinner"></div>
            </div>
        </div>

        <!-- Форма регистрации -->
        <div class="form-container" id="register-form">
            <div class="input-group">
                <label>Никнейм</label>
                <input type="text" id="register-nickname" placeholder="3-16 символов" autocomplete="username">
            </div>

            <div class="input-group">
                <label>Email</label>
                <input type="email" id="register-email" placeholder="example@mail.com" autocomplete="email">
            </div>

            <div class="input-group password-toggle">
                <label>Пароль</label>
                <input type="password" id="register-password" placeholder="Минимум 6 символов" autocomplete="new-password">
                <button type="button" onclick="togglePassword('register-password')">👁️</button>
            </div>

            <div class="input-group password-toggle">
                <label>Повторите пароль</label>
                <input type="password" id="register-password-confirm" placeholder="Повторите пароль" autocomplete="new-password">
                <button type="button" onclick="togglePassword('register-password-confirm')">👁️</button>
            </div>

            <button class="btn" id="registerBtn" onclick="handleRegister()">Зарегистрироваться</button>
            
            <div class="loader" id="registerLoader">
                <div class="spinner"></div>
            </div>
        </div>
    </div>

    <script>
        const { ipcRenderer } = require('electron');

        // Переключение вкладок
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                const target = tab.dataset.tab;

                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.form-container').forEach(f => f.classList.remove('active'));

                tab.classList.add('active');
                document.getElementById(`${target}-form`).classList.add('active');

                hideMessages();
            });
        });

        // Показать/скрыть пароль
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            const button = input.nextElementSibling;
            
            if (input.type === 'password') {
                input.type = 'text';
                button.textContent = '🙈';
            } else {
                input.type = 'password';
                button.textContent = '👁️';
            }
        }

        function showError(message) {
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.textContent = message;
            errorMsg.style.display = 'block';
            document.getElementById('successMsg').style.display = 'none';
        }

        function showSuccess(message) {
            const successMsg = document.getElementById('successMsg');
            successMsg.textContent = message;
            successMsg.style.display = 'block';
            document.getElementById('errorMsg').style.display = 'none';
        }

        function hideMessages() {
            document.getElementById('errorMsg').style.display = 'none';
            document.getElementById('successMsg').style.display = 'none';
        }

        function setLoading(isLoading, type) {
            const btn = document.getElementById(type + 'Btn');
            const loader = document.getElementById(type + 'Loader');
            
            btn.disabled = isLoading;
            loader.style.display = isLoading ? 'block' : 'none';
        }

        // Вход
        async function handleLogin() {
            hideMessages();

            const nickname = document.getElementById('login-nickname').value.trim();
            const password = document.getElementById('login-password').value;

            if (!nickname || !password) {
                showError('Заполните все поля!');
                return;
            }

            if (nickname.length < 3) {
                showError('Никнейм минимум 3 символа!');
                return;
            }

            if (password.length < 6) {
                showError('Пароль минимум 6 символов!');
                return;
            }

            setLoading(true, 'login');

            try {
                const result = await ipcRenderer.invoke('auth-login', { nickname, password });

                if (result.success) {
                    showSuccess('✅ Вход выполнен!');
                } else {
                    showError(result.error || 'Ошибка входа');
                }
            } catch (error) {
                console.error('Login error:', error);
                showError('Ошибка соединения');
            } finally {
                setLoading(false, 'login');
            }
        }

        // Регистрация
        async function handleRegister() {
            hideMessages();

            const nickname = document.getElementById('register-nickname').value.trim();
            const email = document.getElementById('register-email').value.trim();
            const password = document.getElementById('register-password').value;
            const passwordConfirm = document.getElementById('register-password-confirm').value;

            if (!nickname || !email || !password || !passwordConfirm) {
                showError('Заполните все поля!');
                return;
            }

            if (nickname.length < 3 || nickname.length > 16) {
                showError('Никнейм: 3-16 символов!');
                return;
            }

            if (!/^[a-zA-Z0-9_]+$/.test(nickname)) {
                showError('Никнейм: только буквы, цифры и _');
                return;
            }

            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                showError('Некорректный email!');
                return;
            }

            if (password.length < 6) {
                showError('Пароль минимум 6 символов!');
                return;
            }

            if (password !== passwordConfirm) {
                showError('Пароли не совпадают!');
                return;
            }

            setLoading(true, 'register');

            try {
                const result = await ipcRenderer.invoke('auth-register', { nickname, email, password });

                if (result.success) {
                    showSuccess('✅ Регистрация успешна! Входим...');
                    
                    setTimeout(async () => {
                        await ipcRenderer.invoke('auth-login', { nickname, password });
                    }, 1500);
                } else {
                    showError(result.error || 'Ошибка регистрации');
                }
            } catch (error) {
                console.error('Register error:', error);
                showError('Ошибка соединения');
            } finally {
                setLoading(false, 'register');
            }
        }

        // Enter для отправки
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                if (document.getElementById('login-form').classList.contains('active')) {
                    handleLogin();
                } else {
                    handleRegister();
                }
            }
        });

        // Фокус на первое поле
        document.getElementById('login-nickname').focus();

        console.log('✅ Auth page loaded');
    </script>
</body>
</html>
