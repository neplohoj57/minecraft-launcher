<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Launcher</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10b981;
            --primary-glow: rgba(16, 185, 129, 0.4);
            --bg-dark: #0f172a;
            --bg-card: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
            --error: #ef4444;
            --gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--gradient);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        body::before, body::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.4;
        }

        body::before {
            background: #4f46e5;
            top: -100px;
            left: -100px;
        }

        body::after {
            background: #10b981;
            bottom: -100px;
            right: -100px;
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 2rem;
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #10b981, #3b82f6);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            box-shadow: 0 0 30px var(--primary-glow);
            font-size: 2.5rem;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
            position: relative;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            margin-left: 4px;
        }

        input {
            width: 100%;
            padding: 0.875rem 1rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            font-size: 0.95rem;
            font-family: inherit;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.15);
            background: rgba(15, 23, 42, 0.8);
        }

        input::placeholder {
            color: #475569;
        }

        .btn {
            width: 100%;
            padding: 0.875rem;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .switch-mode {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .switch-mode a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            margin-left: 5px;
            transition: opacity 0.2s;
        }

        .switch-mode a:hover {
            opacity: 0.8;
            text-decoration: underline;
        }

        .error-msg {
            color: var(--error);
            font-size: 0.85rem;
            margin-top: 0.5rem;
            margin-left: 4px;
            display: none;
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .loader {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">⛏️</div>
            <h1>Добро пожаловать</h1>
            <p class="subtitle">Войдите в свой аккаунт для начала игры</p>
        </div>

        <form id="authForm">
            <div class="form-group">
                <label for="username">Имя пользователя</label>
                <input type="text" id="username" placeholder="Придумайте никнейм" required autocomplete="off">
                <div class="error-msg" id="usernameError">Некорректное имя</div>
            </div>

            <div class="form-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" placeholder="••••••••" required>
                <div class="error-msg" id="passwordError">Пароль слишком короткий</div>
            </div>

            <button type="submit" class="btn btn-primary" id="submitBtn">
                <span class="loader" id="btnLoader"></span>
                <span id="btnText">Войти</span>
            </button>
        </form>

        <div class="switch-mode">
            <span id="switchText">Нет аккаунта?</span>
            <a href="#" id="switchLink">Зарегистрироваться</a>
        </div>
    </div>

    <script>
        const form = document.getElementById('authForm');
        const switchLink = document.getElementById('switchLink');
        const switchText = document.getElementById('switchText');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const btnLoader = document.getElementById('btnLoader');

        window.electronAPI.onAuthModeChange((mode) => {
            if (mode === 'register') {
                switchText.textContent = 'Уже есть аккаунт?';
                switchLink.textContent = 'Войти';
                btnText.textContent = 'Создать аккаунт';
            } else {
                switchText.textContent = 'Нет аккаунта?';
                switchLink.textContent = 'Зарегистрироваться';
                btnText.textContent = 'Войти';
            }
        });

        switchLink.addEventListener('click', (e) => {
            e.preventDefault();
            window.electronAPI.toggleAuthMode();
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const mode = btnText.textContent.includes('Создать') ? 'register' : 'login';

            let hasError = false;
            if (username.length < 3) {
                document.getElementById('usernameError').style.display = 'block';
                hasError = true;
            } else {
                document.getElementById('usernameError').style.display = 'none';
            }

            if (password.length < 4) {
                document.getElementById('passwordError').style.display = 'block';
                hasError = true;
            } else {
                document.getElementById('passwordError').style.display = 'none';
            }

            if (hasError) return;

            submitBtn.disabled = true;
            btnLoader.style.display = 'inline-block';
            btnText.textContent = mode === 'login' ? 'Вход...' : 'Регистрация...';

            try {
                const result = await window.electronAPI.authenticate(username, password, mode);
                if (result.success) {
                    // Success
                } else {
                    alert(result.message);
                    resetButton();
                }
            } catch (err) {
                alert('Ошибка соединения');
                resetButton();
            }
        });

        function resetButton() {
            submitBtn.disabled = false;
            btnLoader.style.display = 'none';
            const mode = btnText.textContent.includes('Создать') ? 'register' : 'login';
            btnText.textContent = mode === 'login' ? 'Войти' : 'Создать аккаунт';
        }
    </script>
</body>
</html>
