<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Minecraft Launcher</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Фон с эффектом размытия */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('assets/background.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: brightness(0.6);
            z-index: -1;
        }

        /* Overlay для затемнения */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(0,0,0,0.5), rgba(52,152,219,0.3));
            z-index: -1;
        }

        /* Главный контейнер */
        .container {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Шапка */
        .header {
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 20px;
            text-align: center;
            border-bottom: 3px solid #4CAF50;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            position: relative;
        }

        .header h1 {
            color: #4CAF50;
            font-size: 32px;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.8);
            letter-spacing: 2px;
            font-weight: bold;
        }

        /* Панель пользователя */
        .user-panel {
            position: absolute;
            top: 50%;
            right: 20px;
            transform: translateY(-50%);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            border: 2px solid #4CAF50;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 10px rgba(76, 175, 80, 0.5);
        }

        .user-avatar:hover {
            transform: scale(1.1);
            box-shadow: 0 0 15px rgba(76, 175, 80, 0.8);
        }

        .user-name {
            color: #4CAF50;
            font-size: 16px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            cursor: pointer;
            transition: all 0.3s;
        }

        .user-name:hover {
            color: #66BB6A;
            text-shadow: 0 0 10px rgba(76, 175, 80, 0.8);
        }

        .logout-btn {
            padding: 8px 16px;
            background: rgba(244, 67, 54, 0.8);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: rgba(244, 67, 54, 1);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(244, 67, 54, 0.4);
        }

        /* Основной контент */
        .content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-y: auto;
        }

        /* Панель управления */
        .control-panel {
            background: rgba(0, 0, 0, 0.85);
            padding: 30px 40px;
            border-radius: 20px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.8);
            border: 2px solid rgba(76, 175, 80, 0.5);
            width: 550px;
            backdrop-filter: blur(10px);
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Группы ввода */
        .input-group {
            margin-bottom: 18px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #4CAF50;
            font-weight: bold;
            font-size: 15px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .input-group input[type="text"],
        .input-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #4CAF50;
            border-radius: 10px;
            font-size: 15px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.3s;
        }

        .input-group input[type="text"]:focus,
        .input-group select:focus {
            outline: none;
            border-color: #45a049;
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 20px rgba(76, 175, 80, 0.5);
        }

        .input-group input[type="text"]:disabled {
            background: rgba(100, 100, 100, 0.2);
            cursor: not-allowed;
            opacity: 0.7;
        }

        .input-group select option {
            background: #1a1a1a;
            color: white;
        }

        /* Слайдер памяти */
        input[type="range"] {
            width: 100%;
            height: 8px;
            background: transparent;
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }

        input[type="range"]::-webkit-slider-runnable-track {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 5px;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: #4CAF50;
            cursor: pointer;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(76, 175, 80, 0.8);
            margin-top: -6px;
        }

        input[type="range"]::-moz-range-track {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 5px;
        }

        input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            background: #4CAF50;
            cursor: pointer;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(76, 175, 80, 0.8);
            border: none;
        }

        /* Кнопка запуска */
        .launch-btn {
            width: 100%;
            padding: 16px;
            font-size: 22px;
            font-weight: bold;
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 5px 20px rgba(76, 175, 80, 0.4);
            position: relative;
            overflow: hidden;
        }

        .launch-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .launch-btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .launch-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(76, 175, 80, 0.6);
        }

        .launch-btn:active {
            transform: translateY(0);
        }

        .launch-btn:disabled {
            background: linear-gradient(135deg, #666, #555);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .launch-btn span {
            position: relative;
            z-index: 1;
        }

        /* Прогресс бар */
        .progress-container {
            margin-top: 18px;
            display: none;
        }

        .progress {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            height: 30px;
            position: relative;
            overflow: hidden;
            border: 2px solid rgba(76, 175, 80, 0.3);
        }

        .progress-bar {
            background: linear-gradient(90deg, #4CAF50, #45a049, #4CAF50);
            background-size: 200% 100%;
            height: 100%;
            border-radius: 13px;
            width: 0%;
            transition: width 0.3s;
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .progress-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-weight: bold;
            color: white;
            font-size: 14px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            z-index: 1;
        }

        /* Статус */
        .status {
            margin-top: 15px;
            text-align: center;
            color: #4CAF50;
            font-size: 13px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            min-height: 20px;
        }

        /* Футер */
        .footer {
            background: rgba(0, 0, 0, 0.7);
            padding: 12px;
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            font-size: 11px;
            border-top: 2px solid rgba(76, 175, 80, 0.3);
        }

        /* Иконка в кнопке */
        .btn-icon {
            display: inline-block;
            margin-right: 10px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        #cloudBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.5);
        }
    </style>
</head>
<body>
    <div class="background"></div>
    <div class="overlay"></div>

    <div class="container">
        <!-- Шапка -->
        <div class="header">
            <h1>⛏️ MINECRAFT LAUNCHER</h1>
        </div>

        <!-- Основной контент -->
        <div class="content">
            <div class="control-panel">
                <!-- Никнейм -->
                <div class="input-group">
                    <label>👤 Никнейм игрока:</label>
                    <input type="text" id="nickname" value="Steve" placeholder="Введите ваш никнейм">
                </div>

                <!-- Версия -->
                <div class="input-group">
                    <label>🎮 Версия Minecraft:</label>
                    <select id="version">
                        <option value="1.20.1">1.20.1 (Latest)</option>
                        <option value="1.19.4">1.19.4</option>
                        <option value="1.18.2">1.18.2</option>
                        <option value="1.16.5">1.16.5 (Popular)</option>
                        <option value="1.12.2">1.12.2</option>
                        <option value="1.8.9">1.8.9 (PvP)</option>
                    </select>
                </div>

                <!-- Память -->
                <div class="input-group">
                    <label>💾 Оперативная память: <span id="memoryValue">2</span> GB</label>
                    <input type="range" id="memory" min="1" max="8" value="2">
                </div>
                
                <!-- Кнопка облака -->
                <button id="cloudBtn" style="
                    width: 100%;
                    padding: 12px;
                    background: linear-gradient(135deg, #667eea, #764ba2);
                    color: white;
                    border: none;
                    border-radius: 8px;
                    cursor: pointer;
                    font-size: 14px;
                    font-weight: bold;
                    margin-bottom: 15px;
                    transition: all 0.3s;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    gap: 8px;
                ">
                    <span style="font-size: 18px;">☁️</span>
                    <span>Облачная синхронизация</span>
                </button>

                <!-- Кнопка запуска -->
                <button id="launchBtn" class="launch-btn">
                    <span class="btn-icon">▶</span>
                    <span>Играть</span>
                </button>

                <!-- Прогресс -->
                <div class="progress-container" id="progressContainer">
                    <div class="progress">
                        <div class="progress-bar" id="progressBar"></div>
                        <div class="progress-text" id="progressText">0%</div>
                    </div>
                </div>

                <!-- Статус -->
                <div class="status" id="status">Готов к запуску</div>
            </div>
        </div>

        <!-- Футер -->
        <div class="footer">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span>Made with ❤️ | Minecraft Launcher v1.0</span>
                <div>
                    <span id="updateStatus" style="color: rgba(255,255,255,0.5); margin-right: 15px;"></span>
                    <button id="checkUpdateBtn" style="
                        padding: 5px 15px;
                        background: rgba(76, 175, 80, 0.3);
                        color: #4CAF50;
                        border: 1px solid #4CAF50;
                        border-radius: 5px;
                        cursor: pointer;
                        font-size: 11px;
                        transition: all 0.3s;
                    ">Проверить обновления</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { ipcRenderer } = require('electron');
        const { Client, Authenticator } = require('minecraft-launcher-core');
        const Store = require('electron-store');
        
        const store = new Store();

        // ПОЛУЧАЕМ ДАННЫЕ ПОЛЬЗОВАТЕЛЯ
        let currentUser = null;

        ipcRenderer.on('user-data', (event, user) => {
            currentUser = user;
            console.log('👤 Текущий пользователь:', user);
            
            // Показываем информацию о пользователе
            updateUserInfo(user);
            
            // Загружаем никнейм
            if (!user.offline) {
                nicknameInput.value = user.username;
                nicknameInput.disabled = true; // Блокируем изменение для залогиненных
            } else {
                // В офлайн режиме загружаем сохранённый ник
                const savedNickname = store.get('nickname', 'Steve');
                nicknameInput.value = savedNickname;
            }
            
            // Загружаем остальные настройки
            loadSettings();
        });

        // Обновляем информацию о пользователе в интерфейсе
        function updateUserInfo(user) {
            const header = document.querySelector('.header');
            
            let userPanel = document.querySelector('.user-panel');
            if (!userPanel) {
                userPanel = document.createElement('div');
                userPanel.className = 'user-panel';
                header.appendChild(userPanel);
            }
            
            if (user.offline) {
                userPanel.innerHTML = `
                    <div class="user-info">
                        <span class="user-name">🎮 Офлайн режим</span>
                    </div>
                `;
            } else {
                // URL аватара
                const avatarUrls = {
                    'steve': 'https://mc-heads.net/avatar/steve/40',
                    'alex': 'https://mc-heads.net/avatar/alex/40',
                    'herobrine': 'https://mc-heads.net/avatar/herobrine/40',
                    'notch': 'https://mc-heads.net/avatar/notch/40',
                    'creeper': 'https://mc-heads.net/avatar/MHF_Creeper/40',
                    'enderman': 'https://mc-heads.net/avatar/MHF_Enderman/40',
                    'zombie': 'https://mc-heads.net/avatar/MHF_Zombie/40',
                    'skeleton': 'https://mc-heads.net/avatar/MHF_Skeleton/40',
                    'pig': 'https://mc-heads.net/avatar/MHF_Pig/40'
                };

                const avatarUrl = avatarUrls[user.avatar] || avatarUrls['steve'];

                userPanel.innerHTML = `
                    <div class="user-info">
                        <img src="${avatarUrl}" class="user-avatar" id="userAvatar" title="Открыть профиль">
                        <span class="user-name" id="userName" title="Открыть профиль">${user.username}</span>
                        <button class="logout-btn" id="logoutBtn">Выход</button>
                    </div>
                `;
                
                // Кнопка выхода
                document.getElementById('logoutBtn').addEventListener('click', () => {
                    if (confirm('Вы уверены, что хотите выйти?')) {
                        ipcRenderer.send('logout');
                    }
                });

                // Открытие профиля при клике на аватар или имя
                document.getElementById('userAvatar').addEventListener('click', () => {
                    ipcRenderer.send('open-profile');
                });

                document.getElementById('userName').addEventListener('click', () => {
                    ipcRenderer.send('open-profile');
                });
            }
        }

        // Получаем элементы
        const nicknameInput = document.getElementById('nickname');
        const versionSelect = document.getElementById('version');
        const memorySlider = document.getElementById('memory');
        const memoryValue = document.getElementById('memoryValue');
        const launchBtn = document.getElementById('launchBtn');
        const status = document.getElementById('status');
        const progressContainer = document.getElementById('progressContainer');
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');

        // ЗАГРУЖАЕМ СОХРАНЕННЫЕ НАСТРОЙКИ при запуске
        function loadSettings() {
            const savedVersion = store.get('version', '1.20.1');
            const savedMemory = store.get('memory', 2);

            versionSelect.value = savedVersion;
            memorySlider.value = savedMemory;
            memoryValue.textContent = savedMemory;

            status.textContent = '✅ Настройки загружены';
            console.log('Загружены настройки:', { savedVersion, savedMemory });
        }

        // СОХРАНЯЕМ НАСТРОЙКИ при изменении
        function saveSettings() {
            if (currentUser && currentUser.offline) {
                store.set('nickname', nicknameInput.value);
            }
            store.set('version', versionSelect.value);
            store.set('memory', memorySlider.value);
            console.log('Настройки сохранены!');
        }

        // Сохраняем при изменении никнейма
        nicknameInput.addEventListener('change', saveSettings);

        // Сохраняем при изменении версии
        versionSelect.addEventListener('change', saveSettings);

        // Обновление памяти
        memorySlider.addEventListener('input', function() {
            memoryValue.textContent = this.value;
            saveSettings();
        });

        // Запуск
        launchBtn.addEventListener('click', function() {
            const nickname = nicknameInput.value || 'Steve';
            const version = versionSelect.value;
            const memory = memorySlider.value;
            
            saveSettings();
            launchMinecraft(nickname, version, memory);
        });

        function launchMinecraft(nickname, version, memory) {
            launchBtn.disabled = true;
            launchBtn.innerHTML = '<span class="btn-icon">⏳</span><span>Загрузка...</span>';
            progressContainer.style.display = 'block';
            status.textContent = '🚀 Запуск игры...';

            const launcher = new Client();
            const fs = require('fs');
            const path = require('path');

            // Базовые опции
            const opts = {
                root: "./minecraft",
                version: {
                    number: version,
                    type: "release"
                },
                memory: {
                    max: `${memory}G`,
                    min: "1G"
                },
                authorization: Authenticator.getAuth(nickname)
            };

            // Применяем кастомный скин если есть
            if (currentUser && currentUser.skinPath && fs.existsSync(currentUser.skinPath)) {
                console.log('🎨 Применяем кастомный скин:', currentUser.skinPath);
                
                const minecraftDir = path.join(__dirname, '../minecraft');
                const assetsDir = path.join(minecraftDir, 'assets', 'skins');
                
                if (!fs.existsSync(assetsDir)) {
                    fs.mkdirSync(assetsDir, { recursive: true });
                }
                
                const targetSkin = path.join(assetsDir, 'player.png');
                fs.copyFileSync(currentUser.skinPath, targetSkin);
                
                status.textContent = '🎨 Скин применён...';
            }

            // Увеличиваем счётчик запусков
            if (currentUser && !currentUser.offline) {
                ipcRenderer.send('increment-launches', version);
            }

            // Засекаем время запуска
            const launchTime = Date.now();

            launcher.launch(opts);

            launcher.on('progress', (e) => {
                const percent = Math.round((e.task / e.total) * 100);
                progressBar.style.width = percent + '%';
                progressText.textContent = percent + '%';
                status.textContent = `📦 ${e.type}: ${e.task}/${e.total}`;
            });

            launcher.on('close', () => {
                // Считаем время игры
                if (currentUser && !currentUser.offline) {
                    const playMinutes = Math.floor((Date.now() - launchTime) / 60000);
                    if (playMinutes > 0) {
                        ipcRenderer.send('add-playtime', playMinutes);
                    }
                }

                launchBtn.disabled = false;
                launchBtn.innerHTML = '<span class="btn-icon">▶</span><span>Играть</span>';
                progressContainer.style.display = 'none';
                progressBar.style.width = '0%';
                status.textContent = '✅ Готов к запуску';
            });

            launcher.on('data', (e) => {
                console.log('[Minecraft]:', e);
            });

            launcher.on('error', (e) => {
                console.error('[Ошибка]:', e);
                launchBtn.disabled = false;
                launchBtn.innerHTML = '<span class="btn-icon">▶</span><span>Играть</span>';
                progressContainer.style.display = 'none';
                status.textContent = '❌ Ошибка запуска';
            });
        }

        console.log('✅ Лаунчер готов к работе!');
        // Обновления
        const checkUpdateBtn = document.getElementById('checkUpdateBtn');
        const updateStatus = document.getElementById('updateStatus');

        checkUpdateBtn.addEventListener('click', () => {
            ipcRenderer.send('check-updates');
            updateStatus.textContent = 'Проверка...';
        });

        ipcRenderer.on('update-status', (event, text) => {
            updateStatus.textContent = text;
        });
        // Облачная синхронизация
        const cloudBtn = document.getElementById('cloudBtn');
        cloudBtn.addEventListener('click', () => {
            ipcRenderer.send('open-cloud');
        });
    </script>
</body>
</html>
