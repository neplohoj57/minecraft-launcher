<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль - Minecraft Launcher</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10b981;
            --primary-hover: #059669;
            --accent: #3b82f6;
            --bg-dark: #0f172a;
            --bg-card: rgba(30, 41, 59, 0.8);
            --bg-input: rgba(15, 23, 42, 0.6);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
            --error: #ef4444;
            --gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        body::before, body::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            opacity: 0.3;
        }

        body::before {
            background: #4f46e5;
            top: -100px;
            left: -100px;
        }

        body::after {
            background: #10b981;
            bottom: -100px;
            right: -100px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .avatar-container {
            width: 120px;
            height: 120px;
            margin: 0 auto 1.5rem;
            position: relative;
        }

        .avatar {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--accent), var(--primary));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            box-shadow: 0 8px 30px rgba(59, 130, 246, 0.3);
            transition: transform 0.3s;
        }

        .avatar:hover {
            transform: scale(1.05);
        }

        .avatar-upload {
            position: absolute;
            bottom: 5px;
            right: 5px;
            width: 40px;
            height: 40px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 3px solid var(--bg-dark);
            transition: all 0.3s;
            font-size: 1.2rem;
        }

        .avatar-upload:hover {
            transform: scale(1.1);
            background: var(--primary-hover);
        }

        .username {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .user-id {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        input[type="text"],
        input[type="email"] {
            width: 100%;
            padding: 0.875rem 1rem;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            font-size: 0.95rem;
            font-family: inherit;
            transition: all 0.3s;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.15);
        }

        input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn {
            width: 100%;
            padding: 0.875rem;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
            margin-bottom: 0.75rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            color: white;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4);
        }

        .btn-secondary {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            color: var(--accent);
        }

        .btn-secondary:hover {
            background: rgba(59, 130, 246, 0.2);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.2);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin: 1.5rem 0;
        }

        .stat-card {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem;
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 0.25rem;
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .skin-preview {
            margin-top: 1rem;
            text-align: center;
        }

        .skin-image {
            max-width: 100px;
            max-height: 100px;
            border-radius: 8px;
            border: 2px solid var(--border);
            display: none;
            margin: 0 auto;
        }

        .skin-image.show {
            display: block;
        }

        .message {
            padding: 0.75rem 1rem;
            border-radius: 10px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            display: none;
        }

        .message.success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: var(--primary);
        }

        .message.error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: var(--error);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="avatar-container">
                <div class="avatar" id="playerAvatar">😐</div>
                <label class="avatar-upload" for="skinUpload" title="Загрузить скин">
                    📷
                    <input type="file" id="skinUpload" accept="image/png" style="display: none;">
                </label>
            </div>
            <h1 class="username" id="username">Игрок</h1>
            <p class="user-id" id="userId">ID: ---</p>
        </div>

        <div class="message" id="message"></div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="gamesPlayed">0</div>
                <div class="stat-label">Игр сыграно</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="playTime">0ч</div>
                <div class="stat-label">Время в игре</div>
            </div>
        </div>

        <div class="form-group">
            <label>Скин (PNG 64x64 или 64x32)</label>
            <img class="skin-image" id="skinPreview" alt="Skin Preview">
        </div>

        <button class="btn btn-primary" id="saveBtn">Сохранить изменения</button>
        <button class="btn btn-secondary" id="backBtn">Назад</button>
        <button class="btn btn-danger" id="deleteAccountBtn">Удалить аккаунт</button>
    </div>

    <script>
        const messageEl = document.getElementById('message');
        const skinPreview = document.getElementById('skinPreview');
        
        // Init
        window.electronAPI.onUserInfo((info) => {
            document.getElementById('username').textContent = info.username;
            document.getElementById('userId').textContent = 'ID: ' + info.id;
            
            if (info.skin) {
                skinPreview.src = info.skin;
                skinPreview.classList.add('show');
                document.getElementById('playerAvatar').style.backgroundImage = `url(${info.skin})`;
                document.getElementById('playerAvatar').textContent = '';
            }
            
            document.getElementById('gamesPlayed').textContent = info.gamesPlayed || 0;
            document.getElementById('playTime').textContent = (info.playTime || 0) + 'ч';
        });

        // Skin Upload
        document.getElementById('skinUpload').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    skinPreview.src = event.target.result;
                    skinPreview.classList.add('show');
                    showMessage('Скин загружен! Нажмите "Сохранить"', 'success');
                };
                reader.readAsDataURL(file);
            }
        });

        // Save
        document.getElementById('saveBtn').addEventListener('click', () => {
            if (skinPreview.src && skinPreview.classList.contains('show')) {
                window.electronAPI.saveProfile(skinPreview.src);
                showMessage('Профиль сохранён!', 'success');
            } else {
                window.electronAPI.saveProfile(null);
                showMessage('Профиль сохранён!', 'success');
            }
        });

        // Back
        document.getElementById('backBtn').addEventListener('click', () => {
            window.electronAPI.goBack();
        });

        // Delete Account
        document.getElementById('deleteAccountBtn').addEventListener('click', () => {
            if (confirm('Вы уверены? Это действие нельзя отменить!')) {
                window.electronAPI.deleteAccount();
            }
        });

        function showMessage(text, type) {
            messageEl.textContent = text;
            messageEl.className = 'message ' + type;
            messageEl.style.display = 'block';
            setTimeout(() => {
                messageEl.style.display = 'none';
            }, 3000);
        }
    </script>
</body>
</html>
